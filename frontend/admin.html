<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIJAZI Apartments - Admin</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
        body {
            margin: 0;
            background: #f7f7f7;
            color: #111;
            overflow-x: hidden;
        }

        header {
            padding: 32px 20px 26px;
            color: #fff;
            background: linear-gradient(90deg, #c89116, #000);
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 900;
        }

        .muted {
            color: #f3f3f3;
            font-size: 14px;
            opacity: 0.95;
            margin-top: 8px;
            line-height: 1.8;
        }

        .container {
            max-width: 1250px;
            margin: 24px auto;
            padding: 0 16px 30px;
        }

        .top-box {
            background: #111;
            color: #fff;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1 1 220px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        select,
        input {
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            min-width: 180px;
            font-size: 14px;
            min-height: 46px;
            box-sizing: border-box;
            width: 100%;
            outline: none;
        }

        .btn {
            padding: 11px 16px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            transition: .2s;
            min-height: 46px;
        }

        .btn-refresh {
            background: #c89116;
            color: #fff;
        }

        .btn-refresh:hover {
            background: #000;
        }

        .btn-delete {
            background: #c89116;
            color: #fff;
        }

        .btn-delete:hover {
            background: #000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 18px;
        }

        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .06);
            border: 1px solid #eee;
        }

        .stat-card h3 {
            margin: 0 0 8px;
            font-size: 15px;
            color: #555;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #111;
        }

        .status-line {
            margin: 10px 0 18px;
            color: #444;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.8;
        }

        .table-wrap {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .06);
            border: 1px solid #eee;
        }

        .table-scroll {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 950px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 10px;
            font-size: 14px;
            text-align: center;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        th {
            background: #000;
            color: #fff;
            font-weight: 700;
            white-space: nowrap;
        }

        td {
            color: #000;
            background: #fff;
        }

        tr:hover td {
            background: #fcfcfc;
        }

        .empty-row {
            padding: 20px;
            color: #777;
            text-align: center;
        }

        body.ltr-mode .field,
        body.ltr-mode .status-line,
        body.ltr-mode .muted {
            text-align: left;
        }

        @media (max-width: 900px) {
            header {
                padding: 26px 16px 22px;
            }

            header h1 {
                font-size: 28px;
            }

            .container {
                padding: 0 14px 24px;
            }

            .toolbar {
                align-items: stretch;
            }

            .field {
                width: 100%;
                flex: 1 1 100%;
            }

            .btn {
                width: 100%;
            }

            .top-box {
                padding: 14px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .stat-card {
                padding: 16px;
            }

            .stat-number {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 24px;
            }

            .muted {
                font-size: 13px;
            }

            .status-line {
                font-size: 13px;
            }

            th,
            td {
                font-size: 13px;
                padding: 10px 8px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1 id="adminTitle">لوحة الإدارة - HIJAZI Apartments</h1>
        <p class="muted" id="adminSubtitle">عرض الحجوزات وإدارتها</p>
    </header>

    <div class="container">

        <div class="top-box">
            <div class="toolbar">
                <div class="field">
                    <label id="filterLabel" for="aptFilter">فلتر الشقة</label>
                    <select id="aptFilter">
                        <option value="">الكل</option>
                        <option value="1">شقة 1</option>
                        <option value="2">شقة 2</option>
                        <option value="3">شقة 3</option>
                        <option value="4">شقة 4</option>
                        <option value="5">شقة 5</option>
                        <option value="6">شقة 6</option>
                    </select>
                </div>

                <div class="field">
                    <label id="searchLabel" for="searchBox">بحث بالاسم أو الهاتف</label>
                    <input id="searchBox" type="text" placeholder="اكتب اسم أو رقم هاتف..." />
                </div>

                <button class="btn btn-refresh" id="refreshBtn" type="button">تحديث</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalBookingsLabel">إجمالي الحجوزات</h3>
                <div class="stat-number" id="totalBookings">0</div>
            </div>

            <div class="stat-card">
                <h3 id="filteredBookingsLabel">الحجوزات المعروضة</h3>
                <div class="stat-number" id="filteredBookings">0</div>
            </div>

            <div class="stat-card">
                <h3 id="bookedApartmentsLabel">عدد الشقق المحجوزة</h3>
                <div class="stat-number" id="bookedApartments">0</div>
            </div>
        </div>

        <div id="status" class="status-line">جاري تحميل الحجوزات...</div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th id="thApt">الشقة</th>
                            <th id="thName">الاسم</th>
                            <th id="thPhone">الهاتف</th>
                            <th id="thEmail">البريد</th>
                            <th id="thCheckIn">الدخول</th>
                            <th id="thCheckOut">الخروج</th>
                            <th id="thGuests">أشخاص</th>
                            <th id="thPrice">السعر</th>
                            <th id="thAction">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = "https://api.hijazi-apartments.com";

        let ADMIN_USER = "";
        let ADMIN_PASS = "";

        function getAdminTexts() {
            return {
                ar: {
                    title: "لوحة الإدارة - HIJAZI Apartments",
                    subtitle: "عرض الحجوزات وإدارتها",
                    filterLabel: "فلتر الشقة",
                    searchLabel: "بحث بالاسم أو الهاتف",
                    searchPlaceholder: "اكتب اسم أو رقم هاتف...",
                    refresh: "تحديث",
                    totalBookings: "إجمالي الحجوزات",
                    filteredBookings: "الحجوزات المعروضة",
                    bookedApartments: "عدد الشقق المحجوزة",
                    loading: "جاري تحميل الحجوزات...",
                    noBookings: "لا توجد حجوزات مطابقة حالياً",
                    displayedCount: "عدد الحجوزات المعروضة",
                    apt: "الشقة",
                    name: "الاسم",
                    phone: "الهاتف",
                    email: "البريد",
                    checkIn: "الدخول",
                    checkOut: "الخروج",
                    guests: "أشخاص",
                    price: "السعر",
                    action: "إجراء",
                    delete: "حذف",
                    usernamePrompt: "أدخل اسم المستخدم (Admin Username):",
                    passwordPrompt: "أدخل كلمة المرور (Admin Password):",
                    needUsername: "لازم تدخل اسم المستخدم.",
                    needPassword: "لازم تدخل كلمة المرور.",
                    wrongCreds: "❌ بيانات الدخول غير صحيحة. جرّب مرة ثانية.",
                    unauthorized: "❌ غير مصرح. أدخل بيانات الأدمن من جديد.",
                    confirmDelete: "متأكد بدك تحذف هذا الحجز؟",
                    deleted: "✅ تم الحذف",
                    serverError: "تعذر تحميل الحجوزات. حاول مرة أخرى بعد قليل.",
                    deleteError: "تعذر الحذف. تأكد أن السيرفر شغال."
                },
                en: {
                    title: "Admin Dashboard - HIJAZI Apartments",
                    subtitle: "View and manage bookings",
                    filterLabel: "Apartment filter",
                    searchLabel: "Search by name or phone",
                    searchPlaceholder: "Type a name or phone number...",
                    refresh: "Refresh",
                    totalBookings: "Total bookings",
                    filteredBookings: "Displayed bookings",
                    bookedApartments: "Booked apartments",
                    loading: "Loading bookings...",
                    noBookings: "No matching bookings found",
                    displayedCount: "Displayed bookings",
                    apt: "Apartment",
                    name: "Name",
                    phone: "Phone",
                    email: "Email",
                    checkIn: "Check-in",
                    checkOut: "Check-out",
                    guests: "Guests",
                    price: "Price",
                    action: "Action",
                    delete: "Delete",
                    usernamePrompt: "Enter admin username:",
                    passwordPrompt: "Enter admin password:",
                    needUsername: "Admin username is required.",
                    needPassword: "Admin password is required.",
                    wrongCreds: "❌ Invalid login details. Please try again.",
                    unauthorized: "❌ Unauthorized. Enter admin credentials again.",
                    confirmDelete: "Are you sure you want to delete this booking?",
                    deleted: "✅ Deleted successfully",
                    serverError: "Unable to load bookings. Please try again later.",
                    deleteError: "Unable to delete. Make sure the server is running."
                }
            };
        }

        const currentLang = localStorage.getItem("siteLang") || "ar";
        const T = getAdminTexts()[currentLang];

        function applyAdminTranslations() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
            document.body.classList.toggle("ltr-mode", currentLang === "en");

            document.getElementById("adminTitle").textContent = T.title;
            document.getElementById("adminSubtitle").textContent = T.subtitle;
            document.getElementById("filterLabel").textContent = T.filterLabel;
            document.getElementById("searchLabel").textContent = T.searchLabel;
            document.getElementById("searchBox").placeholder = T.searchPlaceholder;
            document.getElementById("refreshBtn").textContent = T.refresh;
            document.getElementById("totalBookingsLabel").textContent = T.totalBookings;
            document.getElementById("filteredBookingsLabel").textContent = T.filteredBookings;
            document.getElementById("bookedApartmentsLabel").textContent = T.bookedApartments;
            document.getElementById("thApt").textContent = T.apt;
            document.getElementById("thName").textContent = T.name;
            document.getElementById("thPhone").textContent = T.phone;
            document.getElementById("thEmail").textContent = T.email;
            document.getElementById("thCheckIn").textContent = T.checkIn;
            document.getElementById("thCheckOut").textContent = T.checkOut;
            document.getElementById("thGuests").textContent = T.guests;
            document.getElementById("thPrice").textContent = T.price;
            document.getElementById("thAction").textContent = T.action;

            document.querySelector('#aptFilter option[value=""]').textContent = currentLang === "ar" ? "الكل" : "All";
            for (let i = 1; i <= 6; i++) {
                document.querySelector(`#aptFilter option[value="${i}"]`).textContent = currentLang === "ar" ? `شقة ${i}` : `Apartment ${i}`;
            }
        }

        function askCredentials(message = "") {
            if (message) alert(message);

            ADMIN_USER = prompt(T.usernamePrompt, ADMIN_USER || "");
            if (ADMIN_USER === null || ADMIN_USER.trim() === "") {
                return askCredentials(T.needUsername);
            }

            ADMIN_PASS = prompt(T.passwordPrompt);
            if (ADMIN_PASS === null || ADMIN_PASS.trim() === "") {
                return askCredentials(T.needPassword);
            }

            ADMIN_USER = ADMIN_USER.trim();
            ADMIN_PASS = ADMIN_PASS.trim();
        }

        function authHeaders() {
            const token = btoa(`${ADMIN_USER}:${ADMIN_PASS}`);
            return {
                Authorization: `Basic ${token}`,
                "Content-Type": "application/json",
            };
        }

        const tbody = document.getElementById("tbody");
        const statusEl = document.getElementById("status");
        const aptFilter = document.getElementById("aptFilter");
        const searchBox = document.getElementById("searchBox");
        const refreshBtn = document.getElementById("refreshBtn");

        const totalBookingsEl = document.getElementById("totalBookings");
        const filteredBookingsEl = document.getElementById("filteredBookings");
        const bookedApartmentsEl = document.getElementById("bookedApartments");

        let allBookings = [];

        function fmtDate(d) {
            const date = new Date(d);
            if (isNaN(date.getTime())) return "";
            return date.toISOString().slice(0, 10);
        }

        function updateStats(filtered) {
            totalBookingsEl.textContent = allBookings.length;
            filteredBookingsEl.textContent = filtered.length;

            const uniqueApts = new Set(filtered.map(b => b.apartmentId).filter(Boolean));
            bookedApartmentsEl.textContent = uniqueApts.size;
        }

        function render() {
            const apt = aptFilter.value;
            const q = searchBox.value.trim().toLowerCase();

            const filtered = allBookings.filter((b) => {
                const matchApt = !apt || String(b.apartmentId) === apt;
                const matchQ =
                    !q ||
                    (b.fullName || "").toLowerCase().includes(q) ||
                    (b.phone || "").toLowerCase().includes(q);
                return matchApt && matchQ;
            });

            updateStats(filtered);

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="empty-row">${T.noBookings}</td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = filtered.map((b) => `
                    <tr>
                        <td>${b.apartmentId ?? ""}</td>
                        <td>${b.fullName ?? ""}</td>
                        <td>${b.phone ?? ""}</td>
                        <td>${b.email ?? ""}</td>
                        <td>${fmtDate(b.checkIn)}</td>
                        <td>${fmtDate(b.checkOut)}</td>
                        <td>${(b.adults ?? 0) + (b.children ?? 0)}</td>
                        <td>${b.totalPriceText ?? (b.totalPrice ?? "")}</td>
                        <td>
                            <button class="btn btn-delete" onclick="delBooking('${b._id}')" type="button">${T.delete}</button>
                        </td>
                    </tr>
                `).join("");
            }

            statusEl.textContent = `${T.displayedCount}: ${filtered.length}`;
        }

        async function load() {
            statusEl.textContent = T.loading;

            try {
                const res = await fetch(`${API_BASE}/admin/bookings`, {
                    method: "GET",
                    headers: authHeaders(),
                });

                if (res.status === 401) {
                    askCredentials(T.wrongCreds);
                    return load();
                }

                const data = await res.json();

                if (!res.ok) {
                    statusEl.textContent = data.message || T.serverError;
                    return;
                }

                allBookings = data.bookings || [];
                render();
            } catch (e) {
                console.error(e);
                statusEl.textContent = T.serverError;
            }
        }

        async function delBooking(id) {
            if (!confirm(T.confirmDelete)) return;

            try {
                const res = await fetch(`${API_BASE}/admin/bookings/${id}`, {
                    method: "DELETE",
                    headers: authHeaders(),
                });

                if (res.status === 401) {
                    askCredentials(T.unauthorized);
                    return delBooking(id);
                }

                const data = await res.json();
                if (!res.ok) {
                    alert(data.message || T.deleteError);
                    return;
                }

                alert(data.message || T.deleted);
                await load();
            } catch (e) {
                console.error(e);
                alert(T.deleteError);
            }
        }

        window.delBooking = delBooking;

        aptFilter.addEventListener("change", render);
        searchBox.addEventListener("input", render);
        refreshBtn.addEventListener("click", load);

        applyAdminTranslations();
        askCredentials();
        load();
    </script>

</body>

</html>
