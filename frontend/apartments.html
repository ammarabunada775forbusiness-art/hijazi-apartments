<html lang="ar" dir="rtl">

<head>

    <link rel="icon" type="image/png" sizes="16x16" href="/frontend/favicon.png">

    <!-- Apple (اختياري) -->
    <link rel="apple-touch-icon" href="/frontend/favicon.png">

    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شققنا | HIJAZI Apartments</title>
    <meta name="google-site-verification" content="CQow9HEGehI7vI8t4xQ3J6aqW_cw58dW8eZ8o8htyf4" />
    <meta name="robots" content="index, follow">
    <meta name="description"
        content="شقق مفروشة متاحة للحجز في عمان الشميساني قريبة من المستشفيات والمطاعم. اختر الشقة المناسبة حسب تاريخ الدخول والخروج.">
    <meta name="keywords"
        content="حجز شقق مفروشة عمان, شقق مفروشة الشميساني, شقق قريبة من المستشفيات عمان, شقق فندقية عمان">
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f8f8f8;
            color: #111;
            overflow-x: hidden;
        }

        .page-header {
            text-align: center;
            padding: 130px 16px 40px;
            background: linear-gradient(90deg, #c89116, #000);
            color: #fff;
        }

        .page-header h1 {
            margin: 0 0 10px;
            font-size: 40px;
            font-weight: 900;
        }

        .page-header p {
            margin: 0;
            font-size: 18px;
            opacity: 0.96;
        }

        .wrap {
            max-width: 1200px;
            margin: 18px auto;
            padding: 0 16px 30px;
        }

        .box {
            background: #111;
            color: #fff;
            border-radius: 20px;
            padding: 24px 26px;
            margin: -18px auto 0;
            position: relative;
            z-index: 2;
            box-shadow: 0 16px 34px rgba(0, 0, 0, .18);
            max-width: 760px;
        }

        .row-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: end;
        }

        .filter-field {
            display: flex;
            flex-direction: column;
            text-align: start;
        }

        .filter-field label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #f2f2f2;
        }

        .filter-field input[type="date"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            min-width: unset;
            min-height: 46px;
            font-size: 15px;
            background: #fff;
            color: #111;
            outline: none;
        }

        .filter-actions {
            margin-top: 18px;
            display: flex;
            justify-content: center;
        }

        .filter-btn {
            min-width: 220px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #d4a017, #8a6508);
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 10px 22px rgba(212, 160, 23, 0.24);
            transition: all 0.25s ease;
            border: none;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e0ad1f, #6f5206);
            box-shadow: 0 14px 28px rgba(212, 160, 23, 0.32);
        }

        .filter-meta {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .status {
            margin-top: 0;
            font-size: 15px;
            opacity: .95;
            font-weight: 700;
            color: #f5f5f5;
        }

        .grid {
            margin-top: 22px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 18px;
        }

        .card {
            border: 1px solid #eee;
            border-radius: 22px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .08);
            color: #111;
            transition: transform 0.28s ease, box-shadow 0.28s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 34px rgba(0, 0, 0, .12);
        }

        .card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            transition: transform 0.35s ease;
        }

        .card:hover img {
            transform: scale(1.04);
        }

        .card-body {
            padding: 18px;
        }

        .card h3 {
            margin: 0 0 10px;
            color: #111;
            font-size: 28px;
            font-weight: 800;
        }

        .card-top-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            z-index: 2;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .18);
        }

        .card-price-box {
            margin-top: 14px;
            padding: 14px;
            border-radius: 16px;
            background: linear-gradient(135deg, #fff8e8, #fff);
            border: 1px solid #f1dfb0;
        }

        .card-price-main {
            color: #b67d00;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .card-price-sub {
            color: #666;
            font-size: 14px;
        }

        .location-line {
            margin-top: 10px;
            color: #444;
            font-size: 14px;
            font-weight: 700;
        }

        .long-note-inline {
            margin-top: 10px;
            color: #c89116;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.7;
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: #f6f6f6;
            margin-bottom: 10px;
        }

        .muted {
            color: #666;
            font-size: 13px;
        }

        .features {
            margin: 10px 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .features li {
            background: #f2f2f2;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
        }

        /* أزرار الكروت */
        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .card-actions button {
            flex: 1;
            min-height: 54px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .btn-icon {
            font-size: 18px;
        }

        .btn-book {
            background: linear-gradient(135deg, #d4a017, #8a6508);
            color: #fff;
            box-shadow: 0 10px 24px rgba(212, 160, 23, 0.25);
        }

        .btn-book:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 16px 30px rgba(212, 160, 23, 0.35);
            background: linear-gradient(135deg, #e0ad1f, #6f5206);
        }

        .btn-details {
            background: linear-gradient(135deg, #1f1f1f, #000);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-details:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 14px 26px rgba(0, 0, 0, 0.25);
            background: linear-gradient(135deg, #2c2c2c, #000);
        }

        /* Ripple */
        .ripple-btn {
            position: relative;
            overflow: hidden;
        }

        .ripple-btn .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            background: rgba(255, 255, 255, 0.35);
            pointer-events: none;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 9999;
            padding: 24px;
            overflow: auto;
        }

        .modal-content {
            max-width: 1120px;
            margin: 30px auto;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .25);
        }

        .modal-header {
            padding: 20px 24px;
            color: #fff;
            background: linear-gradient(90deg, #c89116, #000);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
        }

        .modal-body {
            padding: 24px;
            color: #111;
        }

        .close-btn {
            background: transparent;
            color: #fff;
            font-size: 26px;
            border: none;
            cursor: pointer;
            width: auto;
            padding: 0;
            min-height: auto;
        }

        .gallery-main {
            width: 100%;
            height: 440px;
            object-fit: cover;
            border-radius: 18px;
            display: block;
            margin-bottom: 14px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, .10);
        }

        .thumbs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .thumbs img {
            width: 110px;
            height: 82px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: .22s ease;
        }

        .thumbs img:hover {
            transform: translateY(-2px);
            border-color: #c89116;
        }

        .video-box video {
            width: 100%;
            max-height: 420px;
            border-radius: 12px;
            margin-top: 16px;
            background: #000;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            gap: 20px;
            align-items: start;
        }

        .detail-features {
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .detail-features li {
            background: #f7f7f7;
            padding: 9px 14px;
            border-radius: 999px;
            font-size: 13px;
            border: 1px solid #eee;
            font-weight: 700;
        }

        .room-description {
            margin-top: 14px;
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }

        .map-box {
            margin-top: 18px;
        }

        .map-box iframe {
            width: 100%;
            height: 280px;
            border: 0;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
        }

        .modal-book-btn {
            margin-top: 16px;
            width: 100%;
            min-height: 52px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #d4a017, #8a6508);
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 10px 24px rgba(212, 160, 23, 0.22);
            transition: all 0.25s ease;
        }

        .modal-book-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e0ad1f, #6f5206);
            box-shadow: 0 14px 28px rgba(212, 160, 23, 0.3);
        }

        .skeleton-card {
            background: #fff;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid #eee;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .06);
        }

        .skeleton-image {
            height: 240px;
            background: linear-gradient(90deg, #eee 25%, #f7f7f7 37%, #eee 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s infinite;
        }

        .skeleton-body {
            padding: 18px;
        }

        .skeleton-line {
            height: 14px;
            border-radius: 8px;
            background: linear-gradient(90deg, #eee 25%, #f7f7f7 37%, #eee 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s infinite;
            margin-bottom: 12px;
        }

        .skeleton-line.short {
            width: 40%;
        }

        .skeleton-line.medium {
            width: 65%;
        }

        .skeleton-line.long {
            width: 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        @media (max-width: 850px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .gallery-main {
                height: 260px;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 110px 14px 34px;
            }

            .page-header h1 {
                font-size: 30px;
            }

            .page-header p {
                font-size: 15px;
                line-height: 1.8;
            }

            .wrap {
                padding: 0 14px 24px;
            }

            .box {
                padding: 18px;
                max-width: 100%;
                border-radius: 18px;
            }

            .row-box {
                grid-template-columns: 1fr;
            }

            .filter-actions {
                margin-top: 14px;
            }

            .filter-btn {
                width: 100%;
                min-width: unset;
                height: 48px;
                font-size: 15px;
            }

            .filter-meta {
                align-items: center;
                text-align: center;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .card h3 {
                font-size: 24px;
            }

            .card img,
            .skeleton-image {
                height: 220px;
            }

            .card-body {
                padding: 16px;
            }

            .card-actions {
                flex-direction: column;
                gap: 10px;
            }

            .card-actions button {
                min-height: 48px;
                font-size: 15px;
                border-radius: 16px;
            }

            .modal {
                padding: 12px;
            }

            .modal-content {
                margin: 12px auto;
                border-radius: 18px;
            }

            .modal-header {
                padding: 16px;
            }

            .modal-header h2 {
                font-size: 20px;
            }

            .modal-body {
                padding: 16px;
            }

            .gallery-main {
                height: 220px;
                border-radius: 14px;
            }

            .thumbs {
                gap: 8px;
            }

            .thumbs img {
                width: 84px;
                height: 64px;
            }

            .video-box video {
                max-height: 260px;
            }

            .map-box iframe {
                height: 220px;
            }
        }

        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 26px;
            }

            .card h3 {
                font-size: 22px;
            }

            .card-top-badge {
                top: 10px;
                left: 10px;
                font-size: 12px;
                padding: 7px 10px;
            }

            .card-price-main {
                font-size: 18px;
            }

            .detail-features li,
            .features li {
                font-size: 11px;
            }

            .thumbs img {
                width: 72px;
                height: 58px;
            }
        }
    </style>
</head>

<body>

    <div id="sharedHeader"></div>

    <section class="page-header">
        <h1 id="pageTitle">HIJAZI Apartments</h1>
        <p id="pageSubtitle">اختر الشقة المناسبة حسب تاريخ الدخول والخروج</p>
    </section>

    <div class="wrap">

        <div class="box">
            <div class="row-box">
                <div class="filter-field">
                    <label id="checkInLabel" for="checkIn">تاريخ الدخول</label>
                    <input type="date" id="checkIn">
                </div>

                <div class="filter-field">
                    <label id="checkOutLabel" for="checkOut">تاريخ الخروج</label>
                    <input type="date" id="checkOut">
                </div>
            </div>

            <div class="filter-actions">
                <button id="refreshBtn" class="filter-btn">عرض المتاح</button>
            </div>

            <div class="filter-meta">
                <div id="longStayNotice"></div>
                <div class="status" id="status"></div>
            </div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">تفاصيل الشقة</h2>
                <button class="close-btn" id="closeModal" aria-label="Close">&times;</button>
            </div>

            <div class="modal-body">
                <div class="detail-grid">
                    <div>
                        <img id="mainImage" class="gallery-main" src="" alt="Apartment Image">
                        <div class="thumbs" id="thumbs"></div>

                        <div class="video-box">
                            <video id="modalVideo" controls>
                                <source id="modalVideoSource" src="" type="video/mp4">
                            </video>
                        </div>
                    </div>

                    <div>
                        <h3 id="detailName"></h3>
                        <p id="detailDesc" class="muted"></p>
                        <p><strong id="locationStrong">الموقع:</strong> <span id="detailLocation"></span></p>
                        <p><strong id="nightStrong">السعر لليلة:</strong> <span id="detailNightPrice"></span></p>
                        <p><strong id="nightsStrong">عدد الليالي:</strong> <span id="detailNights"></span></p>
                        <p><strong id="totalStrong">السعر الكلي التقريبي:</strong> <span id="detailTotal"></span></p>
                        <p><strong id="datesStrong">الفترة:</strong> <span id="detailDates"></span></p>

                        <ul class="detail-features" id="detailFeatures"></ul>

                        <div style="margin-top:22px;">
                            <h4 id="roomsTitle">تفاصيل الغرف والمرافق</h4>
                            <div class="room-cards-grid" id="roomCards"></div>
                            <div class="room-description" id="roomDescription"></div>
                            <div class="room-gallery-grid" id="roomGallery"></div>
                        </div>

                        <div class="map-box">
                            <h4 id="mapTitle">موقع الشقة على الخريطة</h4>
                            <iframe id="detailMap" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>

                        <button id="bookNowBtn" class="modal-book-btn" type="button">احجز الآن</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sharedFooter"></div>
    <div id="sharedWhatsApp"></div>

    <script src="js/main.js"></script>
    <script>
        const API_BASE = "https://api.hijazi-apartments.com";

        const checkInEl = document.getElementById("checkIn");
        const checkOutEl = document.getElementById("checkOut");
        const statusEl = document.getElementById("status");
        const gridEl = document.getElementById("grid");
        const refreshBtn = document.getElementById("refreshBtn");

        const modal = document.getElementById("detailsModal");
        const closeModal = document.getElementById("closeModal");

        const url = new URLSearchParams(window.location.search);
        const qIn = url.get("checkIn");
        const qOut = url.get("checkOut");

        function todayISO() {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const dd = String(d.getDate()).padStart(2, "0");
            return `${yyyy}-${mm}-${dd}`;
        }

        checkInEl.min = todayISO();
        checkOutEl.min = todayISO();

        if (qIn) checkInEl.value = qIn;
        if (qOut) checkOutEl.value = qOut;

        function applyApartmentsTranslations() {
            const lang = getCurrentLang();

            if (lang === "ar") {
                document.getElementById("pageTitle").textContent = "HIJAZI Apartments";
                document.getElementById("pageSubtitle").textContent = "اختر الشقة المناسبة حسب تاريخ الدخول والخروج";
                document.getElementById("checkInLabel").textContent = "تاريخ الدخول";
                document.getElementById("checkOutLabel").textContent = "تاريخ الخروج";
                document.getElementById("refreshBtn").textContent = "عرض المتاح";
                document.getElementById("modalTitle").textContent = "تفاصيل الشقة";
                document.getElementById("locationStrong").textContent = "الموقع:";
                document.getElementById("nightStrong").textContent = "السعر لليلة:";
                document.getElementById("nightsStrong").textContent = "عدد الليالي:";
                document.getElementById("totalStrong").textContent = "السعر الكلي التقريبي:";
                document.getElementById("datesStrong").textContent = "الفترة:";
                document.getElementById("roomsTitle").textContent = "تفاصيل الغرف والمرافق";
                document.getElementById("bookNowBtn").textContent = "احجز الآن";
                document.getElementById("mapTitle").textContent = "موقع الشقة على الخريطة";
            } else {
                document.getElementById("pageTitle").textContent = "HIJAZI Apartments";
                document.getElementById("pageSubtitle").textContent = "Choose the right apartment based on your check-in and check-out dates";
                document.getElementById("checkInLabel").textContent = "Check-in";
                document.getElementById("checkOutLabel").textContent = "Check-out";
                document.getElementById("refreshBtn").textContent = "Show available";
                document.getElementById("modalTitle").textContent = "Apartment details";
                document.getElementById("locationStrong").textContent = "Location:";
                document.getElementById("nightStrong").textContent = "Price per night:";
                document.getElementById("nightsStrong").textContent = "Nights:";
                document.getElementById("totalStrong").textContent = "Estimated total:";
                document.getElementById("datesStrong").textContent = "Dates:";
                document.getElementById("roomsTitle").textContent = "Rooms & facilities";
                document.getElementById("bookNowBtn").textContent = "Book now";
                document.getElementById("mapTitle").textContent = "Apartment location on map";
            }
        }

        function validateDates(allowEmpty = true) {
            const lang = getCurrentLang();
            const checkIn = checkInEl.value;
            const checkOut = checkOutEl.value;

            if (!checkIn || !checkOut) {
                return allowEmpty ? null : (lang === "ar" ? "❌ اختر تاريخ الدخول والخروج" : "❌ Please select check-in and check-out");
            }

            if (checkOut <= checkIn) {
                return lang === "ar" ? "❌ تاريخ الخروج لازم يكون بعد تاريخ الدخول" : "❌ Check-out must be after check-in";
            }

            return null;
        }

        function cardHtml(id, checkIn = "", checkOut = "") {
            const lang = getCurrentLang();
            const apt = HIJAZI_APARTMENTS[id];
            const nights = checkIn && checkOut ? calcNights(checkIn, checkOut) : 0;
            const total = nights ? apt.price * nights : 0;

            const aptName = lang === "ar" ? apt.nameAr : apt.nameEn;
            const desc = lang === "ar" ? apt.descAr : apt.descEn;
            const features = lang === "ar" ? apt.featuresAr : apt.featuresEn;

            const locationLabel = lang === "ar" ? "الموقع" : "Location";
            const availableLabel = lang === "ar" ? "متاحة ✅" : "Available ✅";
            const nightLabel = lang === "ar" ? "السعر لليلة" : "Price per night";
            const nightsLabel = lang === "ar" ? "عدد الليالي" : "Nights";
            const totalLabel = lang === "ar" ? "السعر الكلي التقريبي" : "Estimated total";
            const detailsBtn = lang === "ar" ? "عرض التفاصيل" : "View details";
            const bookBtn = lang === "ar" ? "احجز الآن" : "Book now";
            const jodText = lang === "ar" ? "دينار" : "JOD";
            const apartmentWord = lang === "ar" ? "شقة راقية" : "Premium apartment";

            return `
                <div class="card">
                    <div class="card-top-badge">${availableLabel}</div>

                    <img src="${apt.images[0]}" alt="${aptName}">

                    <div class="card-body">
                        <div class="pill">${apartmentWord}</div>
                        <h3>${aptName}</h3>
                        <div class="muted">${desc}</div>

                        <div class="location-line">📍 ${locationLabel}: ${apt.location}</div>

                        <ul class="features">
                            ${features.slice(0, 4).map(f => `<li>${f}</li>`).join("")}
                        </ul>

                        <div class="card-price-box">
                            <div class="card-price-main">${nightLabel}: ${apt.price} ${jodText}</div>
                            ${nights ? `<div class="card-price-sub">${nightsLabel}: ${nights}</div>` : ""}
                            ${nights ? `<div class="card-price-sub">${totalLabel}: ${total} ${jodText}</div>` : ""}
                        </div>

                        ${nights >= 30 ? `<div class="long-note-inline">${SITE_TRANSLATIONS[lang].longStayAlert}</div>` : ""}

                        <div class="card-actions">
                            <button class="btn-book ripple-btn" onclick="goBook(${apt.id})" type="button">
                                <span class="btn-icon"></span>
                                <span>${bookBtn}</span>
                            </button>

                            <button class="btn-details ripple-btn" onclick="openDetails(${apt.id})" type="button">
                                <span class="btn-icon"></span>
                                <span>${detailsBtn}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.goBook = function (id) {
            const checkIn = checkInEl.value;
            const checkOut = checkOutEl.value;

            window.location.href =
                `booking.html?apt=${encodeURIComponent(id)}&checkIn=${encodeURIComponent(checkIn)}&checkOut=${encodeURIComponent(checkOut)}`;
        };

        function renderRoomCards(apt, selectedKey = "master") {
            const lang = getCurrentLang();
            const roomCards = document.getElementById("roomCards");
            const roomDescription = document.getElementById("roomDescription");
            const roomGallery = document.getElementById("roomGallery");

            roomCards.innerHTML = apt.rooms.map(room => {
                const title = lang === "ar" ? room.titleAr : room.titleEn;
                return `
                    <div class="room-card ${room.key === selectedKey ? "active" : ""}" onclick="selectRoomCard(${apt.id}, '${room.key}')">
                        ${title}
                    </div>
                `;
            }).join("");

            const selectedRoom = apt.rooms.find(r => r.key === selectedKey) || apt.rooms[0];
            roomDescription.textContent = lang === "ar" ? selectedRoom.noteAr : selectedRoom.noteEn;

            roomGallery.innerHTML = selectedRoom.images.map(img => `
                <img src="${img}" alt="Room image">
            `).join("");
        }

        window.selectRoomCard = function (aptId, roomKey) {
            const apt = HIJAZI_APARTMENTS[aptId];
            renderRoomCards(apt, roomKey);
        };

        window.openDetails = function (id) {
            const lang = getCurrentLang();
            const apt = HIJAZI_APARTMENTS[id];
            const checkIn = checkInEl.value;
            const checkOut = checkOutEl.value;
            const nights = checkIn && checkOut ? calcNights(checkIn, checkOut) : 0;
            const total = nights ? apt.price * nights : 0;

            document.getElementById("modalTitle").textContent = lang === "ar" ? `تفاصيل ${apt.nameAr}` : `${apt.nameEn} details`;
            document.getElementById("detailName").textContent = lang === "ar" ? apt.nameAr : apt.nameEn;
            document.getElementById("detailDesc").textContent = lang === "ar" ? apt.descAr : apt.descEn;
            document.getElementById("detailLocation").textContent = apt.location;
            document.getElementById("detailNightPrice").textContent = `${apt.price} ${lang === "ar" ? "دينار" : "JOD"}`;
            document.getElementById("detailNights").textContent = nights || (lang === "ar" ? "غير محدد" : "Not selected");
            document.getElementById("detailTotal").textContent = nights ? `${total} ${lang === "ar" ? "دينار" : "JOD"}` : (lang === "ar" ? "اختر التاريخ" : "Select dates");
            document.getElementById("detailDates").textContent = checkIn && checkOut ? `${checkIn} → ${checkOut}` : (lang === "ar" ? "لم يتم اختيار التواريخ" : "Dates not selected");

            const mainImage = document.getElementById("mainImage");
            const thumbs = document.getElementById("thumbs");
            const featureList = document.getElementById("detailFeatures");
            const video = document.getElementById("modalVideo");
            const videoSource = document.getElementById("modalVideoSource");
            const detailMap = document.getElementById("detailMap");
            const bookNowBtn = document.getElementById("bookNowBtn");

            mainImage.src = apt.images[0];

            thumbs.innerHTML = apt.images.map(img => `
                <img src="${img}" alt="${lang === "ar" ? apt.nameAr : apt.nameEn}" onclick="document.getElementById('mainImage').src='${img}'">
            `).join("");

            const features = lang === "ar" ? apt.featuresAr : apt.featuresEn;
            featureList.innerHTML = features.map(f => `<li>${f}</li>`).join("");

            videoSource.src = apt.video;
            video.load();

            detailMap.src = apt.mapEmbed;

            bookNowBtn.onclick = () => goBook(id);

            renderRoomCards(apt, "master");
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        };

        function closeDetailsModal() {
            modal.style.display = "none";
            document.body.style.overflow = "";
        }

        closeModal.addEventListener("click", closeDetailsModal);

        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeDetailsModal();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && modal.style.display === "block") {
                closeDetailsModal();
            }
        });

        function renderSkeletonCards(count = 3) {
            gridEl.innerHTML = Array.from({ length: count }).map(() => `
                <div class="skeleton-card">
                    <div class="skeleton-image"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-line long"></div>
                        <div class="skeleton-line medium"></div>
                    </div>
                </div>
            `).join("");
        }

        function initRippleButtons() {
            document.querySelectorAll(".ripple-btn").forEach(button => {
                button.addEventListener("click", function (e) {
                    const oldRipple = this.querySelector(".ripple");
                    if (oldRipple) oldRipple.remove();

                    const ripple = document.createElement("span");
                    ripple.classList.add("ripple");

                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);

                    ripple.style.width = ripple.style.height = `${size}px`;
                    ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
                    ripple.style.top = `${e.clientY - rect.top - size / 2}px`;

                    this.appendChild(ripple);

                    ripple.addEventListener("animationend", () => {
                        ripple.remove();
                    });
                });
            });
        }

        async function loadAvailability() {
            const lang = getCurrentLang();
            const checkIn = checkInEl.value;
            const checkOut = checkOutEl.value;

            renderLongStayNotice("longStayNotice", checkIn, checkOut);

            const err = validateDates(true);

            if (!checkIn || !checkOut) {
                statusEl.textContent = lang === "ar"
                    ? "تم عرض جميع الشقق. يمكنك اختيار التواريخ لاحقًا."
                    : "All apartments are displayed. You can choose dates later.";

                gridEl.innerHTML = Object.keys(HIJAZI_APARTMENTS).map(id => cardHtml(Number(id))).join("");
                initRippleButtons();
                return;
            }

            if (err) {
                statusEl.textContent = err;
                gridEl.innerHTML = "";
                return;
            }

            statusEl.textContent = lang === "ar" ? "جاري فحص الشقق المتاحة..." : "Checking available apartments...";
            renderSkeletonCards(3);

            try {
                const res = await fetch(`${API_BASE}/availability?checkIn=${encodeURIComponent(checkIn)}&checkOut=${encodeURIComponent(checkOut)}`);
                const data = await res.json();

                if (!res.ok) {
                    statusEl.textContent = data.message || (lang === "ar" ? "صار خطأ أثناء الفحص" : "An error happened while checking");
                    gridEl.innerHTML = "";
                    return;
                }

                const available = data.availableApartments || [];

                if (available.length === 0) {
                    statusEl.textContent = lang === "ar"
                        ? "❌ للأسف لا يوجد شقق متاحة بهالتواريخ. جرّب تواريخ ثانية."
                        : "❌ Unfortunately, no apartments are available for these dates. Try different dates.";
                    gridEl.innerHTML = "";
                    return;
                }

                statusEl.textContent = lang === "ar"
                    ? `✅ عدد الشقق المتاحة: ${available.length}`
                    : `✅ Available apartments: ${available.length}`;

                gridEl.innerHTML = available.map(id => cardHtml(id, checkIn, checkOut)).join("");
                initRippleButtons();
            } catch (e) {
                console.error(e);
                statusEl.textContent = lang === "ar"
                    ? "تعذر الاتصال بخادم الحجوزات. حاول مرة أخرى بعد قليل."
                    : "Unable to connect to the booking server. Please try again later.";
                gridEl.innerHTML = "";
            }
        }

        refreshBtn.addEventListener("click", loadAvailability);

        checkInEl.addEventListener("change", () => {
            checkOutEl.min = checkInEl.value || todayISO();
            renderLongStayNotice("longStayNotice", checkInEl.value, checkOutEl.value);
        });

        checkOutEl.addEventListener("change", () => {
            renderLongStayNotice("longStayNotice", checkInEl.value, checkOutEl.value);
        });

        renderSharedHeader("apartments", false);
        renderSharedFooter();
        renderWhatsAppWidget();
        applyApartmentsTranslations();
        renderLongStayNotice("longStayNotice", checkInEl.value, checkOutEl.value);
        loadAvailability();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
